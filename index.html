*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f2f5;overflow-x:hidden}
input,select,button{font-family:inherit;outline:none}
button{cursor:pointer}
::-webkit-scrollbar{display:none}
.hide-scroll{-ms-overflow-style:none;scrollbar-width:none}

.header{background:linear-gradient(135deg,#1a6b4a 0%,#0d4a32 100%);color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:20}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.header-title{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.header-sub{font-size:11px;opacity:.7}
.header-btns{display:flex;gap:8px}
.btn-hist{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px}
.btn-add{background:#f0c040;border:none;color:#1a1a1a;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600}

.search-wrap{position:relative}
.search-input{width:100%;padding:10px 12px 10px 36px;border-radius:10px;border:none;font-size:15px;background:rgba(255,255,255,.95);color:#1a1a1a}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.4}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:#888}

.cats{display:flex;gap:6px;overflow-x:auto;padding:10px 12px 6px;background:#fff;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:15;-webkit-overflow-scrolling:touch}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;font-size:13px;transition:all .15s}
.cat-btn.active{background:#1a6b4a;color:#fff;font-weight:600}
.cat-btn.inactive{background:#f0f0f0;color:#555;font-weight:400}

.products{flex:1;overflow-y:auto;padding:8px 12px}
.product-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.product-name{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.edit-btn{background:none;border:none;font-size:16px;cursor:pointer;color:#aaa;padding:2px 6px}
.variants{display:flex;gap:8px;flex-wrap:wrap}
.var-btn{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;border:1.5px solid #e0e0e0;background:#fafafa;font-size:13px;transition:background .1s}
.var-btn:active{background:#e8f5e9}
.var-label{color:#777;font-size:12px}
.var-price{font-weight:700;color:#1a6b4a}
.var-plus{background:#1a6b4a;color:#fff;border-radius:6px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}

.cart-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1a6b4a;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 20px rgba(0,0,0,.15);z-index:30}
.cart-badge{background:#f0c040;color:#1a1a1a;border-radius:12px;padding:2px 10px;font-weight:700;font-size:14px;margin-right:10px}
.cart-total{font-size:18px;font-weight:700}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:flex;flex-direction:column;justify-content:flex-end}
.overlay-center{align-items:center;justify-content:center;padding:20px}
.panel{background:#fff;border-radius:20px 20px 0 0;max-height:85vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;width:100%}
.panel-header{padding:16px 20px 12px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:18px;font-weight:700}
.panel-close{background:none;border:none;font-size:24px;color:#888}
.panel-body{flex:1;overflow-y:auto;padding:8px 16px}

.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-detail{font-size:12px;color:#888}
.cart-item-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qty-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.qty-minus{border:1.5px solid #ddd;background:#fff;color:#333}
.qty-plus{border:none;background:#1a6b4a;color:#fff}
.qty-num{font-weight:700;font-size:15px;min-width:20px;text-align:center}
.cart-item-subtotal{font-weight:700;font-size:14px;min-width:70px;text-align:right;color:#1a6b4a}

.cart-footer{padding:12px 20px 16px;border-top:2px solid #1a6b4a}
.cart-footer-total{display:flex;justify-content:space-between;margin-bottom:12px}
.cart-footer-label{font-size:16px;font-weight:600}
.cart-footer-amount{font-size:22px;font-weight:800;color:#1a6b4a}
.pay-section{background:#f8f9fa;border-radius:12px;padding:12px;margin-bottom:12px}
.pay-label{font-size:13px;color:#666;margin-bottom:6px;font-weight:500}
.pay-input-wrap{position:relative;margin-bottom:8px}
.pay-input{width:100%;padding:12px 12px 12px 36px;border-radius:10px;border:1.5px solid #ddd;font-size:18px;font-weight:700;color:#1a1a1a;background:#fff}
.pay-input:focus{border-color:#1a6b4a}
.pay-rp{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:#888;font-weight:600}
.pay-quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pay-quick-btn{padding:6px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:12px;font-weight:600;color:#1a6b4a;transition:all .1s}
.pay-quick-btn:active{background:#e8f5e9}
.pay-quick-btn.exact{background:#1a6b4a;color:#fff;border-color:#1a6b4a}
.change-box{border-radius:10px;padding:12px;text-align:center;margin-bottom:4px}
.change-box.positive{background:#e8f5e9;border:1.5px solid #a5d6a7}
.change-box.negative{background:#ffeaea;border:1.5px solid #ef9a9a}
.change-box.zero{background:#fff8e1;border:1.5px solid #ffe082}
.change-label{font-size:12px;color:#666;margin-bottom:2px}
.change-amount{font-size:24px;font-weight:800}
.change-amount.positive{color:#1a6b4a}
.change-amount.negative{color:#e53935}
.change-amount.zero{color:#f9a825}
.cart-footer-btns{display:flex;gap:10px}
.btn-clear{flex:1;padding:12px;border-radius:10px;border:1.5px solid #ddd;background:#fff;font-size:14px;color:#e53935;font-weight:600}
.btn-checkout{flex:2;padding:12px;border-radius:10px;border:none;background:#1a6b4a;color:#fff;font-size:15px;font-weight:700}
.btn-checkout:disabled{background:#999;cursor:default}

.modal-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:400px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-fields{display:flex;flex-direction:column;gap:12px}
.modal-input{padding:10px;border-radius:8px;border:1.5px solid #ddd;font-size:14px;width:100%}
.modal-row{display:flex;gap:8px}
.modal-btns{display:flex;gap:10px;margin-top:4px}
.btn-cancel{flex:1;padding:12px;border-radius:10px;border:1.5px solid #ddd;background:#fff;font-size:14px}
.btn-save{flex:1;padding:12px;border-radius:10px;border:none;background:#1a6b4a;color:#fff;font-size:14px;font-weight:700}

.empty{text-align:center;padding:40px;color:#999}
.empty-icon{font-size:40px;margin-bottom:8px}

.tx-item{padding:12px 0;border-bottom:1px solid #f0f0f0}
.tx-header{display:flex;justify-content:space-between;margin-bottom:6px}
.tx-date{font-size:12px;color:#888}
.tx-total{font-weight:700;color:#1a6b4a}
.tx-line{font-size:12px;color:#666;padding-left:8px}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a6b4a;color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:fadeInOut 1.5s ease}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
</style>

const CATS=["Semua","Mie Instan","Kopi & Sachet","Bumbu & Minyak","Perawatan","Obat","Kebersihan","Snack","Es Krim","Minuman","Air Mineral","Grosir Minuman"];
const fmt=n=>"Rp "+n.toLocaleString("id-ID");
const LS={
  get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del(k){try{localStorage.removeItem(k)}catch{}}
};

function App(){
  const[products,setProducts]=useState(()=>{
    let all=[...PRODUCTS];
    const c=LS.get("kasir-custom");if(c)all=[...all,...c];
    const mods=LS.get("kasir-mods");
    if(mods){
      const{prices={},deleted=[],names={}}=mods;
      all=all.filter(p=>!deleted.includes(p.id));
      all=all.map(p=>({...p,name:names[p.id]||p.name,v:prices[p.id]||p.v}));
    }
    return all;
  });
  const[search,setSearch]=useState("");
  const[cat,setCat]=useState("Semua");
  const[cart,setCart]=useState(()=>LS.get("kasir-cart")||[]);
  const[showCart,setShowCart]=useState(false);
  const[showAdd,setShowAdd]=useState(false);
  const[showHist,setShowHist]=useState(false);
  const[history,setHistory]=useState(()=>LS.get("kasir-hist")||[]);
  const[np,setNp]=useState({name:"",cat:"Mie Instan",price:"",label:"Pcs"});
  const[toast,setToast]=useState("");
  const[bayar,setBayar]=useState("");
  const[editItem,setEditItem]=useState(null);
  const sRef=useRef(null);

  const saveMods=(up)=>{
    const prices={},names={},deleted=[];
    PRODUCTS.forEach(bp=>{
      const u=up.find(p=>p.id===bp.id);
      if(!u){deleted.push(bp.id);return}
      if(u.name!==bp.name)names[bp.id]=u.name;
      if(JSON.stringify(u.v)!==JSON.stringify(bp.v))prices[bp.id]=u.v;
    });
    LS.set("kasir-mods",{prices,deleted,names});
    LS.set("kasir-custom",up.filter(x=>x.id.startsWith("c-")));
  };

  useEffect(()=>{cart.length?LS.set("kasir-cart",cart):LS.del("kasir-cart")},[cart]);

  const filtered=products.filter(p=>{
    const mc=cat==="Semua"||p.cat===cat;
    const ms=!search||p.name.toLowerCase().includes(search.toLowerCase());
    return mc&&ms;
  });

  const addToCart=useCallback((prod,vr)=>{
    const key=prod.id+"-"+vr.l;
    setCart(prev=>{
      const ex=prev.find(c=>c.key===key);
      if(ex)return prev.map(c=>c.key===key?{...c,qty:c.qty+1}:c);
      return[...prev,{key,name:prod.name,label:vr.l,price:vr.p,qty:1}];
    });
    showToast(prod.name+" ditambahkan");
  },[]);

  const updateQty=useCallback((key,d)=>{
    setCart(prev=>prev.map(c=>c.key===key?{...c,qty:Math.max(0,c.qty+d)}:c).filter(c=>c.qty>0));
  },[]);

  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const totalItems=cart.reduce((s,c)=>s+c.qty,0);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),1500)};

  const checkout=()=>{
    if(!cart.length)return;
    const tx={id:Date.now(),date:new Date().toLocaleString("id-ID"),items:[...cart],total};
    const nh=[tx,...history].slice(0,100);
    setHistory(nh);LS.set("kasir-hist",nh);
    setCart([]);setShowCart(false);setBayar("");
    showToast("Transaksi tersimpan!");
  };

  const addProd=()=>{
    if(!np.name||!np.price)return;
    const p={id:"c-"+Date.now(),name:np.name,cat:np.cat,v:[{l:np.label,p:parseInt(np.price)}]};
    const up=[...products,p];setProducts(up);
    saveMods(up);
    setNp({name:"",cat:"Mie Instan",price:"",label:"Pcs"});setShowAdd(false);
    showToast("Produk ditambahkan!");
  };

  const openEdit=(prod)=>{
    setEditItem({...prod,editName:prod.name,editCat:prod.cat,editV:prod.v.map(vr=>({...vr,ep:String(vr.p)}))});
  };
  const saveEdit=()=>{
    if(!editItem)return;
    const up=products.map(p=>p.id!==editItem.id?p:{...p,name:editItem.editName||p.name,cat:editItem.editCat||p.cat,v:editItem.editV.map(vr=>({l:vr.l,p:parseInt(vr.ep)||vr.p}))});
    setProducts(up);saveMods(up);setEditItem(null);showToast("Produk diperbarui!");
  };
  const deleteProd=()=>{
    if(!editItem||!confirm('Hapus produk "'+editItem.name+'"?'))return;
    const up=products.filter(p=>p.id!==editItem.id);
    setProducts(up);saveMods(up);setEditItem(null);showToast("Produk dihapus!");
  };
  const addEditVar=()=>{
    if(!editItem)return;
    setEditItem({...editItem,editV:[...editItem.editV,{l:"Pcs",p:0,ep:""}]});
  };
  const rmEditVar=(idx)=>{
    if(!editItem||editItem.editV.length<=1)return;
    setEditItem({...editItem,editV:editItem.editV.filter((_,i)=>i!==idx)});
  };

  return e("div",{style:{maxWidth:480,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",position:"relative"}},
    // Toast
    toast&&e("div",{className:"toast"},toast),

    // Header
    e("div",{className:"header"},
      e("div",{className:"header-top"},
        e("div",null,
          e("div",{className:"header-title"},"Kasir Toko"),
          e("div",{className:"header-sub"},products.length+" produk")
        ),
        e("div",{className:"header-btns"},
          e("button",{className:"btn-hist",onClick:()=>setShowHist(true)},"Riwayat"),
          e("button",{className:"btn-add",onClick:()=>setShowAdd(true)},"+ Produk")
        )
      ),
      e("div",{className:"search-wrap"},
        e("input",{ref:sRef,className:"search-input",type:"text",placeholder:"Cari produk...",value:search,onChange:ev=>setSearch(ev.target.value)}),
        e("span",{className:"search-icon"},"\u{1F50D}"),
        search&&e("button",{className:"search-clear",onClick:()=>{setSearch("");sRef.current?.focus()}},"\u2715")
      )
    ),

    // Categories
    e("div",{className:"cats hide-scroll"},
      CATS.map(c=>e("button",{key:c,className:"cat-btn "+(cat===c?"active":"inactive"),onClick:()=>setCat(c)},c))
    ),

    // Products
    e("div",{className:"products hide-scroll",style:{paddingBottom:cart.length?80:16}},
      filtered.length===0&&e("div",{className:"empty"},e("div",{className:"empty-icon"},"\u{1F4E6}"),"Tidak ada produk ditemukan"),
      filtered.map(p=>e("div",{key:p.id,className:"product-card"},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
          e("div",{className:"product-name",style:{marginBottom:0}},p.name),
          e("button",{onClick:()=>openEdit(p),style:{background:"none",border:"none",fontSize:16,cursor:"pointer",color:"#aaa",padding:"2px 6px"}},"\u270F\uFE0F")
        ),
        e("div",{className:"variants"},
          p.v.map(vr=>e("button",{key:vr.l,className:"var-btn",onClick:()=>addToCart(p,vr)},
            e("span",{className:"var-label"},vr.l),
            e("span",{className:"var-price"},fmt(vr.p)),
            e("span",{className:"var-plus"},"+")
          ))
        )
      ))
    ),

    // Cart bar
    cart.length>0&&!showCart&&e("div",{className:"cart-bar",onClick:()=>setShowCart(true)},
      e("div",null,
        e("span",{className:"cart-badge"},totalItems),
        e("span",{style:{fontSize:14}},"Lihat Keranjang")
      ),
      e("div",{className:"cart-total"},fmt(total))
    ),

    // Cart panel
    showCart&&e("div",{className:"overlay",onClick:ev=>{if(ev.target===ev.currentTarget)setShowCart(false)}},
      e("div",{className:"panel"},
        e("div",{className:"panel-header"},
          e("div",{className:"panel-title"},"Keranjang ("+totalItems+")"),
          e("button",{className:"panel-close",onClick:()=>setShowCart(false)},"\u2715")
        ),
        e("div",{className:"panel-body hide-scroll"},
          cart.map(c=>e("div",{key:c.key,className:"cart-item"},
            e("div",{className:"cart-item-info"},
              e("div",{className:"cart-item-name"},c.name),
              e("div",{className:"cart-item-detail"},c.label+" \u00B7 "+fmt(c.price))
            ),
            e("div",{className:"cart-item-controls"},
              e("button",{className:"qty-btn qty-minus",onClick:()=>updateQty(c.key,-1)},"\u2212"),
              e("span",{className:"qty-num"},c.qty),
              e("button",{className:"qty-btn qty-plus",onClick:()=>updateQty(c.key,1)},"+"),
              e("span",{className:"cart-item-subtotal"},fmt(c.price*c.qty))
            )
          ))
        ),
        e("div",{className:"cart-footer"},
          e("div",{className:"cart-footer-total"},
            e("span",{className:"cart-footer-label"},"Total Belanja"),
            e("span",{className:"cart-footer-amount"},fmt(total))
          ),
          e("div",{className:"pay-section"},
            e("div",{className:"pay-label"},"Uang Pembeli"),
            e("div",{className:"pay-input-wrap"},
              e("span",{className:"pay-rp"},"Rp"),
              e("input",{className:"pay-input",type:"number",placeholder:"0",value:bayar,onChange:ev=>setBayar(ev.target.value),inputMode:"numeric"})
            ),
            e("div",{className:"pay-quick"},
              e("button",{className:"pay-quick-btn exact",onClick:()=>setBayar(String(total))},"Uang Pas"),
              [5000,10000,20000,50000,100000].filter(n=>n>=total||n>=5000).slice(0,4).map(n=>
                e("button",{key:n,className:"pay-quick-btn",onClick:()=>setBayar(String(n))},fmt(n))
              ),
              total>100000&&e("button",{className:"pay-quick-btn",onClick:()=>setBayar(String(Math.ceil(total/50000)*50000))},fmt(Math.ceil(total/50000)*50000))
            ),
            bayar&&e("div",{className:"change-box "+(parseInt(bayar)>=total?(parseInt(bayar)===total?"zero":"positive"):"negative")},
              e("div",{className:"change-label"},parseInt(bayar)>=total?"Kembalian":"Kurang"),
              e("div",{className:"change-amount "+(parseInt(bayar)>=total?(parseInt(bayar)===total?"zero":"positive"):"negative")},
                fmt(Math.abs(parseInt(bayar)-total))
              )
            )
          ),
          e("div",{className:"cart-footer-btns"},
            e("button",{className:"btn-clear",onClick:()=>{setCart([]);setShowCart(false);setBayar("")}},"Hapus Semua"),
            e("button",{className:"btn-checkout",onClick:checkout},"Selesai & Simpan")
          )
        )
      )
    ),

    // Add product modal
    showAdd&&e("div",{className:"overlay overlay-center",onClick:ev=>{if(ev.target===ev.currentTarget)setShowAdd(false)}},
      e("div",{className:"modal-box"},
        e("div",{className:"modal-title"},"Tambah Produk Baru"),
        e("div",{className:"modal-fields"},
          e("input",{className:"modal-input",placeholder:"Nama produk",value:np.name,onChange:ev=>setNp({...np,name:ev.target.value})}),
          e("select",{className:"modal-input",value:np.cat,onChange:ev=>setNp({...np,cat:ev.target.value})},
            CATS.filter(c=>c!=="Semua").map(c=>e("option",{key:c,value:c},c))
          ),
          e("div",{className:"modal-row"},
            e("input",{className:"modal-input",style:{flex:2},placeholder:"Harga",type:"number",value:np.price,onChange:ev=>setNp({...np,price:ev.target.value})}),
            e("select",{className:"modal-input",style:{flex:1},value:np.label,onChange:ev=>setNp({...np,label:ev.target.value})},
              ["Pcs","Ecer","Karton","Renteng","Box","Galon"].map(l=>e("option",{key:l,value:l},l))
            )
          ),
          e("div",{className:"modal-btns"},
            e("button",{className:"btn-cancel",onClick:()=>setShowAdd(false)},"Batal"),
            e("button",{className:"btn-save",onClick:addProd},"Simpan")
          )
        )
      )
    ),

    // History modal
    showHist&&e("div",{className:"overlay",onClick:ev=>{if(ev.target===ev.currentTarget)setShowHist(false)}},
      e("div",{className:"panel"},
        e("div",{className:"panel-header"},
          e("div",{className:"panel-title"},"Riwayat Transaksi"),
          e("button",{className:"panel-close",onClick:()=>setShowHist(false)},"\u2715")
        ),
        e("div",{className:"panel-body hide-scroll"},
          history.length===0&&e("div",{className:"empty"},"Belum ada transaksi"),
          history.map(tx=>e("div",{key:tx.id,className:"tx-item"},
            e("div",{className:"tx-header"},
              e("span",{className:"tx-date"},tx.date),
              e("span",{className:"tx-total"},fmt(tx.total))
            ),
            tx.items.map((it,i)=>e("div",{key:i,className:"tx-line"},
              it.qty+"x "+it.name+" ("+it.label+") \u2014 "+fmt(it.price*it.qty)
            ))
          ))
        )
      )
    ),

    // Edit modal
    editItem&&e("div",{className:"overlay overlay-center",onClick:ev=>{if(ev.target===ev.currentTarget)setEditItem(null)}},
      e("div",{className:"modal-box",style:{maxHeight:"80vh",overflowY:"auto"}},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          e("div",{className:"modal-title",style:{marginBottom:0}},"Edit Produk"),
          e("button",{className:"panel-close",onClick:()=>setEditItem(null)},"\u2715")
        ),
        e("div",{className:"modal-fields"},
          e("div",null,
            e("div",{style:{fontSize:12,color:"#888",marginBottom:4}},"Nama Produk"),
            e("input",{className:"modal-input",value:editItem.editName,onChange:ev=>setEditItem({...editItem,editName:ev.target.value})})
          ),
          e("div",null,
            e("div",{style:{fontSize:12,color:"#888",marginBottom:4}},"Kategori"),
            e("select",{className:"modal-input",value:editItem.editCat,onChange:ev=>setEditItem({...editItem,editCat:ev.target.value})},
              CATS.filter(c=>c!=="Semua").map(c=>e("option",{key:c,value:c},c))
            )
          ),
          e("div",null,
            e("div",{style:{fontSize:12,color:"#888",marginBottom:8}},"Harga"),
            editItem.editV.map((vr,idx)=>e("div",{key:idx,style:{display:"flex",gap:8,marginBottom:8,alignItems:"center"}},
              e("select",{style:{flex:1,padding:8,borderRadius:8,border:"1.5px solid #ddd",fontSize:13},value:vr.l,onChange:ev=>{
                const nv=[...editItem.editV];nv[idx]={...nv[idx],l:ev.target.value};setEditItem({...editItem,editV:nv});
              }},["Pcs","Ecer","Karton","Renteng","Box","Galon","Pack"].map(l=>e("option",{key:l,value:l},l))),
              e("div",{style:{flex:2,position:"relative"}},
                e("span",{style:{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#888"}},"Rp"),
                e("input",{type:"number",style:{width:"100%",padding:"8px 8px 8px 28px",borderRadius:8,border:"1.5px solid #ddd",fontSize:14,fontWeight:600,boxSizing:"border-box"},value:vr.ep,onChange:ev=>{
                  const nv=[...editItem.editV];nv[idx]={...nv[idx],ep:ev.target.value};setEditItem({...editItem,editV:nv});
                }})
              ),
              editItem.editV.length>1&&e("button",{onClick:()=>rmEditVar(idx),style:{background:"#ffeaea",border:"none",borderRadius:8,width:32,height:32,fontSize:16,cursor:"pointer",color:"#e53935",flexShrink:0}},"\u2715")
            )),
            e("button",{onClick:addEditVar,style:{width:"100%",padding:8,borderRadius:8,border:"1.5px dashed #ccc",background:"#fafafa",fontSize:13,color:"#666",cursor:"pointer"}},"+ Tambah Varian Harga")
          ),
          e("div",{style:{display:"flex",gap:10,marginTop:8}},
            e("button",{onClick:deleteProd,style:{flex:1,padding:12,borderRadius:10,border:"1.5px solid #e53935",background:"#fff",fontSize:14,cursor:"pointer",color:"#e53935",fontWeight:600}},"Hapus"),
            e("button",{onClick:saveEdit,style:{flex:2,padding:12,borderRadius:10,border:"none",background:"#1a6b4a",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}},"Simpan")
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(e(App));
</script>
</body>
</html>
